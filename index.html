  <script>
  (function () {
    'use strict';

    var CYCLE = 15000;
    var T_SCROLL = 9000;
    var T_CROSSFADE = 12000;
    var T_LOGO_OUT = 13500;

    var wrap = document.getElementById('logogori-anim');
    if (!wrap) return;

    var guide = wrap.querySelector('#guide-path');
    var measure = wrap.querySelector('#measure-path');
    var poema = wrap.querySelector('#poema');
    var outline = wrap.querySelector('#outline');
    if (!guide || !measure || !poema || !outline) return;

    var pathLen = measure.getTotalLength();
    var lineEnds = [];
    var SCALE_X = 341.57 / 1364;
    var SCALE_Y = 369.32 / 1479;

    guide.style.strokeDasharray = pathLen + ' ' + pathLen;
    guide.style.strokeDashoffset = String(pathLen);

    function pathPointToView(pt) {
      return { x: pt.x * SCALE_X, y: pt.y * SCALE_Y };
    }

    function closestPathT(x, y) {
      if (!pathLen) return 0;
      var best = 0;
      var bestD = Infinity;
      for (var i = 0; i <= 600; i++) {
        var len = (i / 600) * pathLen;
        var pt = pathPointToView(measure.getPointAtLength(len));
        var dx = pt.x - x;
        var dy = pt.y - y;
        var d = dx * dx + dy * dy;
        if (d < bestD) {
          bestD = d;
          best = len;
        }
      }
      return best / pathLen;
    }

    function parseTranslate(text) {
      var m = (text.getAttribute('transform') || '').match(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/);
      return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : null;
    }

    function buildLineEnds() {
      var texts = Array.prototype.slice.call(poema.querySelectorAll('text'));
      var lines = texts.map(function (text) {
        var pt = parseTranslate(text);
        var box = text.getBBox();
        var cx = pt ? pt.x : box.x + box.width * 0.2;
        var cy = pt ? pt.y : box.y + box.height * 0.5;
        return closestPathT(cx, cy);
      });

      lines.sort(function (a, b) { return a - b; });

      for (var i = 1; i < lines.length; i++) {
        if (lines[i] <= lines[i - 1]) {
          lines[i] = Math.min(1, lines[i - 1] + 0.004);
        }
      }

      lines[lines.length - 1] = 1;
      return lines;
    }

    function ease(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function setPathReveal(p) {
      if (p < 0) p = 0;
      if (p > 1) p = 1;
      var offset = pathLen * (1 - p);
      guide.style.strokeDashoffset = String(offset);
    }

    function setScrollReveal(progress) {
      var n = lineEnds.length;
      if (!n || !pathLen) {
        setPathReveal(progress);
        return;
      }

      var head = progress * n;
      var idx = Math.min(Math.floor(head), n - 1);
      var local = head - idx;
      var startP = idx === 0 ? 0 : lineEnds[idx - 1];
      var endP = lineEnds[idx];
      setPathReveal(startP + (endP - startP) * local);
    }

    function showFullPoema() {
      setPathReveal(1);
    }

    function hidePoema() {
      guide.style.strokeDashoffset = String(pathLen);
    }

    function resetCycle() {
      hidePoema();
      poema.style.opacity = '1';
      outline.style.opacity = '0';
    }

    function startLoop() {
      lineEnds = buildLineEnds();
      resetCycle();

      function tick(now) {
        var t = now % CYCLE;

        if (t < T_SCROLL) {
          poema.style.opacity = '1';
          outline.style.opacity = '0';
          setScrollReveal(t / T_SCROLL);
        } else if (t < T_CROSSFADE) {
          showFullPoema();
          var p = ease((t - T_SCROLL) / (T_CROSSFADE - T_SCROLL));
          poema.style.opacity = String(1 - p);
          outline.style.opacity = String(p);
        } else if (t < T_LOGO_OUT) {
          poema.style.opacity = '0';
          outline.style.opacity = String(1 - ease((t - T_CROSSFADE) / (T_LOGO_OUT - T_CROSSFADE)));
        } else {
          resetCycle();
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(startLoop);
    } else {
      window.addEventListener('load', startLoop);
    }
  })();
  </script>
